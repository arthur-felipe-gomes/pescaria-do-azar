name: Testar jogo Pescaria do Azar

on:
  push:
  pull_request:

jobs:
  test-game:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pygame

      - name: Verificar se o jogo não quebra
        run: |
          python -m py_compile "PESCARIA DO AZAR/main2.py"
